<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard GPS | GeoMath</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{
background:#020617;
color:white;
font-family:Arial,sans-serif;
}

.card{
background:#111827;
padding:25px;
border-radius:20px;
}

.valor{
font-size:2rem;
font-weight:bold;
color:#22d3ee;
}

#map{
height:450px;
border-radius:20px;
}

</style>

</head>

<body>
  <nav class="bg-black p-5">

<div class="max-w-7xl mx-auto flex justify-between">

<h1 class="text-cyan-400 text-2xl font-bold">

GeoMath Dashboard

</h1>

<div class="space-x-5">

<a href="index.html">Início</a>

<a href="matematica-computacional.html">
Matemática
</a>

<a href="trilateracao.html">
Trilateração
</a>

<a href="coordenadas.html">
Coordenadas
</a>

<a href="estatistica.html">
Estatística
</a>

</div>

</div>

</nav>
<section class="max-w-7xl mx-auto p-8">

<div class="grid md:grid-cols-4 gap-6">

<div class="card">

<h3>Latitude</h3>

<div id="lat" class="valor">
--
</div>

</div>

<div class="card">

<h3>Longitude</h3>

<div id="lng" class="valor">
--
</div>

</div>

<div class="card">

<h3>Altitude</h3>

<div id="alt" class="valor">
--
</div>

</div>

<div class="card">

<h3>Precisão</h3>

<div id="acc" class="valor">
--
</div>

</div>

</div>

</section>
<section class="max-w-7xl mx-auto px-8">

<div class="grid md:grid-cols-3 gap-6">

<div class="card">

<h3>Satélites Simulados</h3>

<div id="sats" class="valor">
12
</div>

</div>

<div class="card">

<h3>Velocidade</h3>

<div id="vel" class="valor">
0 km/h
</div>

</div>

<div class="card">

<h3>UTC</h3>

<div id="utc" class="valor">
--
</div>

</div>

</div>

</section>
<section class="max-w-7xl mx-auto p-8">

<div class="card">

<h2 class="text-3xl mb-5">

Mapa em Tempo Real

</h2>

<div id="map"></div>

</div>

</section>
<script>

const map =
L.map('map')
.setView([-23.5505,-46.6333],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

let marker =
L.marker([-23.5505,-46.6333])
.addTo(map);

let dadosPrecisao=[];

const chart =
new Chart(

document.getElementById(
"grafico"
),

{

type:"line",

data:{

labels:[],

datasets:[{

label:"Precisão (m)",

data:[]

}]

}

}

);

function atualizarHora(){

document.getElementById(
"utc"
).innerHTML=

new Date()
.toUTCString()
.slice(17,25);

}

setInterval(
atualizarHora,
1000
);

atualizarHora();

function atualizarPosicao(){

navigator.geolocation.getCurrentPosition(

(pos)=>{

const lat =
pos.coords.latitude;

const lng =
pos.coords.longitude;

const alt =
pos.coords.altitude || 0;

const acc =
pos.coords.accuracy;

document.getElementById(
"lat"
).innerHTML=
lat.toFixed(5);

document.getElementById(
"lng"
).innerHTML=
lng.toFixed(5);

document.getElementById(
"alt"
).innerHTML=
alt.toFixed(1)+" m";

document.getElementById(
"acc"
).innerHTML=
acc.toFixed(1)+" m";

marker.setLatLng([lat,lng]);

map.setView([lat,lng]);

dadosPrecisao.push(acc);

if(dadosPrecisao.length>20){

dadosPrecisao.shift();

}

chart.data.labels =
dadosPrecisao.map(
(_,i)=>i+1
);

chart.data.datasets[0].data =
dadosPrecisao;

chart.update();

}

);

}

setInterval(
atualizarPosicao,
3000
);

atualizarPosicao();

</script>
<footer class="bg-black p-10 text-center mt-10">

GeoMath Dashboard © 2026

</footer>

</body>
</html>
